<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>聪明格 · 游戏合集</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');

:root{
  --green:#16a34a;
  --green-light:#4ade80;
  --green-pale:#bbf7d0;
  --yellow:#fde047;
  --orange:#fb923c;
  --pink:#f472b6;
  --blue:#38bdf8;
  --purple:#a78bfa;
  --bg:#052e16;
  --card-bg:#0a3d20;
  --text:#ecfdf5;
  --text-muted:#6ee7b7;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Nunito','PingFang SC','Microsoft YaHei',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

.bg-deco{
  position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;
}
.bg-deco span{
  position:absolute;border-radius:50%;opacity:0.07;
  animation:float 8s ease-in-out infinite;
}
.bg-deco span:nth-child(1){width:320px;height:320px;background:var(--green-light);top:-80px;left:-80px;animation-delay:0s;}
.bg-deco span:nth-child(2){width:200px;height:200px;background:var(--yellow);top:40%;right:-60px;animation-delay:2s;}
.bg-deco span:nth-child(3){width:260px;height:260px;background:var(--blue);bottom:-80px;left:30%;animation-delay:4s;}
.bg-deco span:nth-child(4){width:140px;height:140px;background:var(--pink);top:20%;left:55%;animation-delay:1s;}
@keyframes float{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-24px) scale(1.04);}}

.page{
  position:relative;z-index:1;
  max-width:680px;
  margin:0 auto;
  padding:32px 20px 48px;
}

.header{text-align:center;margin-bottom:36px;}
.logo-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;}
.logo-icon{
  width:52px;height:52px;
  background:var(--green-light);
  border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
  box-shadow:0 4px 0 #15803d;
  animation:bounce-icon 3s ease-in-out infinite;
}
@keyframes bounce-icon{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.logo-title{
  font-size:28px;font-weight:900;
  color:var(--green-light);
  letter-spacing:-0.5px;
  text-shadow:0 3px 0 #15803d;
}
.subtitle{font-size:14px;color:var(--text-muted);font-weight:700;letter-spacing:0.5px;}

.section-label{
  display:flex;align-items:center;gap:8px;
  font-size:11px;font-weight:800;
  color:var(--text-muted);letter-spacing:1.8px;text-transform:uppercase;
  margin:28px 0 12px;
}
.section-label::before,.section-label::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(110,231,183,.22),transparent);
}

.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}

.game-card{
  display:block;text-decoration:none;
  background:var(--card-bg);
  border-radius:18px;
  padding:20px 18px 16px;
  border:2px solid rgba(74,222,128,0.12);
  position:relative;overflow:hidden;
  transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  opacity:0;transform:translateY(20px);
  animation:card-in .5s ease forwards;
}
.game-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;
}
.game-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 14px 36px rgba(0,0,0,.45);border-color:rgba(74,222,128,.35);}
.game-card:active{transform:translateY(0) scale(0.97);}

@keyframes card-in{to{opacity:1;transform:translateY(0);}}
.games-grid .game-card:nth-child(1){animation-delay:.05s;}
.games-grid .game-card:nth-child(2){animation-delay:.12s;}
.games-grid .game-card:nth-child(3){animation-delay:.19s;}

.card-emoji{font-size:38px;display:block;margin-bottom:10px;line-height:1;filter:drop-shadow(0 2px 6px rgba(0,0,0,.35));}
.card-name{font-size:17px;font-weight:900;color:var(--text);line-height:1.25;margin-bottom:6px;}
.card-desc{font-size:12px;font-weight:700;color:var(--text-muted);line-height:1.55;}
.card-tag{
  display:inline-block;font-size:10px;font-weight:800;
  padding:3px 9px;border-radius:20px;margin-top:8px;letter-spacing:.4px;
}

.theme-green {border-top:3px solid #4ade80;}
.theme-yellow{border-top:3px solid #fde047;}
.theme-orange{border-top:3px solid #fb923c;}
.theme-pink  {border-top:3px solid #f472b6;}
.theme-blue  {border-top:3px solid #38bdf8;}
.theme-purple{border-top:3px solid #a78bfa;}

.theme-green  .card-tag{background:rgba(74,222,128,.18);color:#4ade80;}
.theme-yellow .card-tag{background:rgba(253,224,71,.18);color:#fde047;}
.theme-orange .card-tag{background:rgba(251,146,60,.18);color:#fb923c;}
.theme-pink   .card-tag{background:rgba(244,114,182,.18);color:#f472b6;}
.theme-blue   .card-tag{background:rgba(56,189,248,.18);color:#38bdf8;}
.theme-purple .card-tag{background:rgba(167,139,250,.18);color:#a78bfa;}

.hot-badge{
  position:absolute;top:12px;right:12px;
  background:linear-gradient(135deg,#f97316,#ef4444);
  color:#fff;font-size:10px;font-weight:900;
  padding:3px 8px;border-radius:20px;
  box-shadow:0 2px 10px rgba(239,68,68,.5);
  animation:pulse-badge 2s ease-in-out infinite;
}
@keyframes pulse-badge{0%,100%{box-shadow:0 2px 10px rgba(239,68,68,.5);}50%{box-shadow:0 2px 20px rgba(239,68,68,.85);}}

/* 宽卡（语言区第3张独占一行） */
.game-card.wide{grid-column:span 2;}

.footer{
  text-align:center;margin-top:44px;
  font-size:12px;color:rgba(110,231,183,.3);font-weight:700;letter-spacing:.5px;
}

@media(max-width:380px){
  .games-grid{grid-template-columns:1fr;}
  .game-card.wide{grid-column:span 1;}
  .logo-title{font-size:22px;}
}
@media(min-width:560px){
  .games-grid{grid-template-columns:repeat(3,1fr);}
  .game-card.wide{grid-column:span 1;}
}
</style>
</head>
<body>

<div class="bg-deco">
  <span></span><span></span><span></span><span></span>
</div>

<div class="page">

  <header class="header">
    <div class="logo-row">
      <div class="logo-icon">🧩</div>
      <div class="logo-title">聪明格游戏合集</div>
    </div>
    <div class="subtitle">边玩边学 · 6–12岁适用</div>
  </header>

  <!-- 数学 -->
  <div class="section-label">数学闯关</div>
  <div class="games-grid">
    <a class="game-card theme-green" href="smart_grid_run.html">
      <span class="card-emoji">🏃</span>
      <div class="card-name">数学跑酷</div>
      <div class="card-desc">答对口算题<br>自动飞越障碍</div>
      <span class="card-tag">口算练习</span>
    </a>
    <a class="game-card theme-orange" href="smart_grid_run (2).html">
      <span class="hot-badge">🔥 极速</span>
      <span class="card-emoji">⚡</span>
      <div class="card-name">数学跑酷<br>极速版</div>
      <div class="card-desc">双倍速度<br>挑战反应极限</div>
      <span class="card-tag">高难度</span>
    </a>
  </div>

  <!-- 语言 -->
  <div class="section-label">语言挑战</div>
  <div class="games-grid">
    <a class="game-card theme-blue" href="solitaire-associations.html">
      <span class="card-emoji">🃏</span>
      <div class="card-name">单词卡牌<br>分类</div>
      <div class="card-desc">找出同类单词<br>锻炼词汇联想</div>
      <span class="card-tag">英语词汇</span>
    </a>
    <a class="game-card theme-purple" href="english-wordle-jr.html">
      <span class="card-emoji">🔤</span>
      <div class="card-name">逻辑猜单词</div>
      <div class="card-desc">六次机会猜出<br>神秘英文单词</div>
      <span class="card-tag">英语逻辑</span>
    </a>
    <a class="game-card theme-pink wide" href="idiom-wordle.html">
      <span class="card-emoji">📖</span>
      <div class="card-name">逻辑猜成语</div>
      <div class="card-desc">六次机会猜出神秘四字成语</div>
      <span class="card-tag">成语积累</span>
    </a>
  </div>

  <div class="footer">聪明格出品 &nbsp;·&nbsp; xvyiran.github.io/games</div>

</div>
</body>
</html>
