<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Sort! 单词接龙纸牌</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--bg:#F0EEF8;--cw:86px;--ch:62px;--cr:11px;--ov:22px;--sh:0 3px 10px rgba(0,0,0,.13);--shh:0 8px 22px rgba(0,0,0,.22);--cp:#6C63FF;--ct:#F7C948;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;background-image:radial-gradient(circle at 15% 25%,rgba(108,99,255,.07) 0,transparent 45%),radial-gradient(circle at 85% 75%,rgba(255,107,107,.07) 0,transparent 45%);user-select:none;}
header{display:flex;align-items:center;justify-content:space-between;padding:9px 20px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.08);position:sticky;top:0;z-index:300}
.logo{font-family:'Fredoka One',cursive;font-size:20px;color:var(--cp)}.logo em{color:#FF6B6B;font-style:normal}
.hstats{display:flex;gap:10px;align-items:center}
.pill{display:flex;align-items:center;gap:5px;background:#F3F0FF;border-radius:20px;padding:5px 13px;font-weight:800;font-size:13px;color:var(--cp)}.pill.red{background:#FFF0F0;color:#FF6B6B}
.btn{background:linear-gradient(135deg,#6C63FF,#8e44ad);color:#fff;border:none;border-radius:20px;padding:7px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;box-shadow:0 3px 10px rgba(108,99,255,.35);transition:transform .15s,box-shadow .15s}.btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(108,99,255,.45)}
.btn-ghost{background:transparent;color:var(--cp);border:2px solid var(--cp);border-radius:20px;padding:5px 14px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:background .15s}.btn-ghost:hover{background:#F3F0FF}
.game{display:flex;flex-direction:column;gap:10px;padding:12px 18px;max-width:1150px;margin:0 auto}
.f-row{display:flex;gap:10px;align-items:flex-start;flex-wrap:nowrap}
.f-slot{width:var(--cw);min-height:var(--ch);border-radius:var(--cr);border:2.5px dashed rgba(108,99,255,.28);background:rgba(255,255,255,.55);display:flex;flex-direction:column;align-items:center;cursor:pointer;transition:border-color .18s,background .18s,transform .14s;overflow:hidden;flex-shrink:0;}
.f-slot:hover{transform:scale(1.04)}.f-slot.live{border-style:solid}
.f-slot.drop-hl{background:rgba(108,99,255,.1)!important;border:2.5px solid var(--cp)!important}
.f-slot-empty-hint{font-size:10px;font-weight:700;color:rgba(108,99,255,.3);text-align:center;padding:14px 4px 8px;line-height:1.4}
.f-banner{width:100%;padding:5px 4px 4px;display:flex;flex-direction:column;align-items:center;gap:1px;border-bottom:2px solid transparent}
.f-banner-emoji{font-size:20px;line-height:1}
.f-progress{font-family:'Fredoka One',cursive;font-size:11px;color:rgba(255,255,255,.9);background:rgba(0,0,0,.18);border-radius:8px;padding:1px 7px;margin-top:2px}
.f-chips{display:flex;flex-direction:column;width:100%;padding:3px 4px 4px;gap:2px}
.f-chip{width:100%;border-radius:5px;padding:2px 4px;font-size:9px;font-weight:800;color:#fff;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;animation:popIn .22s cubic-bezier(.175,.885,.32,1.275) both}
.f-chip.img-chip{font-size:14px;padding:1px 4px}
@keyframes popIn{from{transform:scale(.3) rotate(-5deg);opacity:0}to{transform:scale(1);opacity:1}}
.f-slot.done{opacity:.55;cursor:default;transform:none!important}.f-slot.done:hover{transform:none}
.mid{display:flex;gap:12px;align-items:flex-start}
.draw-area{display:flex;flex-direction:column;gap:6px;flex-shrink:0;width:calc(var(--cw)*2+10px)}
.draw-lbl{font-family:'Fredoka One',cursive;font-size:11px;color:#bbb;letter-spacing:1px}
.draw-row{display:flex;gap:8px}
.stock{width:var(--cw);height:var(--ch);border-radius:var(--cr);background:linear-gradient(135deg,#6C63FF,#9B59B6);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:3px 3px 0 #4A42CC,var(--sh);transition:transform .15s,box-shadow .15s;position:relative}
.stock:hover{transform:translateY(-3px);box-shadow:3px 6px 0 #4A42CC,var(--shh)}.stock:active{transform:translateY(1px);box-shadow:1px 1px 0 #4A42CC}
.stock.empty{opacity:.3;cursor:default;pointer-events:none}
.stock-n{position:absolute;top:4px;right:5px;background:var(--ct);color:#444;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:900}
.stock-icon{font-size:22px}
.waste{width:var(--cw);height:var(--ch);border-radius:var(--cr);border:2.5px dashed rgba(108,99,255,.22);background:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;position:relative;flex-shrink:0}
.waste-hint{font-size:10px;color:#ccc;font-weight:700;text-align:center;line-height:1.4}
.card{width:var(--cw);height:var(--ch);border-radius:var(--cr);box-shadow:var(--sh);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:pointer;transition:transform .15s,box-shadow .15s;background:#fff;border:2.5px solid #E8E4F5;flex-shrink:0;gap:2px;}
.card:hover{transform:translateY(-4px) scale(1.04);box-shadow:var(--shh);z-index:50}
.card.sel{outline:3px solid var(--cp);outline-offset:2px;transform:translateY(-6px) scale(1.06);box-shadow:0 0 0 5px rgba(108,99,255,.2),var(--shh);z-index:60}
.card.face-down{background:linear-gradient(135deg,#6C63FF,#9B59B6);cursor:default;border-color:transparent}.card.face-down::after{content:'✦';color:rgba(255,255,255,.22);font-size:20px}.card.face-down:hover{transform:none;box-shadow:var(--sh)}
.card.title-card{background:linear-gradient(135deg,#FFFDE7,#FFF3B0)!important;border-color:var(--ct)!important}.card.title-card .cw{color:#9A7A00}.card.title-card::before{content:'★';position:absolute;top:3px;right:5px;font-size:10px;color:var(--ct)}
.cw{font-family:'Fredoka One',cursive;font-size:14px;color:#333;line-height:1;text-align:center;padding:0 4px}
.card.img-card .cw{font-size:28px;line-height:1}
.card.ambig{border-color:#A29BFE}
.card.col-sel-dim{opacity:.55}
.tableau{display:flex;gap:8px;align-items:flex-start;flex:1;overflow-x:auto;padding-bottom:4px}
.col{display:flex;flex-direction:column;width:var(--cw);flex-shrink:0;min-height:var(--ch)}
.col .card+.card{margin-top:calc(-1*var(--ch)+var(--ov))}
.col-empty{width:var(--cw);height:var(--ch);border-radius:var(--cr);border:2.5px dashed rgba(108,99,255,.2);background:rgba(255,255,255,.28);cursor:pointer;transition:border-color .18s,background .18s}.col-empty.drop-hl{border-color:var(--cp);background:rgba(108,99,255,.07)}
.prog-wrap{display:flex;gap:8px;align-items:center}
.prog-bar{flex:1;height:8px;background:#E0DBF5;border-radius:6px;overflow:hidden;min-width:120px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cp),#FF6B6B);border-radius:6px;transition:width .5s cubic-bezier(.34,1.56,.64,1)}
.prog-pct{font-family:'Fredoka One',cursive;font-size:12px;color:var(--cp);min-width:30px;text-align:right}
#toast{position:fixed;top:66px;left:50%;transform:translateX(-50%) translateY(-12px);background:#333;color:#fff;padding:8px 20px;border-radius:22px;font-weight:800;font-size:13px;opacity:0;pointer-events:none;transition:all .22s;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{background:#1DD1A1}#toast.err{background:#FF6B6B}#toast.warn{background:#FF9F43}#toast.info{background:var(--cp)}
.overlay{position:fixed;inset:0;background:rgba(20,16,40,.6);display:flex;align-items:center;justify-content:center;z-index:500;opacity:0;pointer-events:none;transition:opacity .3s}.overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:24px;padding:28px;text-align:center;max-width:400px;width:92%;box-shadow:0 20px 60px rgba(0,0,0,.25);transform:scale(.88);transition:transform .3s cubic-bezier(.34,1.56,.64,1)}.overlay.show .modal{transform:scale(1)}
.m-emoji{font-size:50px;margin-bottom:6px}.m-title{font-family:'Fredoka One',cursive;font-size:24px;color:#333;margin-bottom:6px}
.m-sub{color:#888;font-size:13px;font-weight:600;margin-bottom:16px;line-height:1.5}
.m-stats{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
.m-stat{background:#F3F0FF;border-radius:12px;padding:8px 14px;font-weight:800;color:var(--cp);font-size:13px}.m-stat small{display:block;font-size:9px;color:#aaa;margin-bottom:2px}
.tut-modal{max-width:460px}
.tut-steps{display:flex;flex-direction:column;gap:10px;text-align:left;margin:14px 0 16px}
.tut-step{display:flex;gap:9px;align-items:flex-start}
.tut-dot{width:26px;height:26px;border-radius:50%;background:var(--cp);color:#fff;font-family:'Fredoka One',cursive;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.tut-text{font-size:12px;color:#555;line-height:1.5;font-weight:600}.tut-text b{color:#333}
.tut-tags{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:10px 0}
.tut-tag{padding:4px 11px;border-radius:16px;font-size:11px;font-weight:800;color:#fff}
.results-modal{max-width:800px;width:95%;padding:24px 20px;max-height:90vh;overflow-y:auto}
.results-title{font-family:'Fredoka One',cursive;font-size:22px;color:#333;margin-bottom:4px}
.results-sub{font-size:13px;color:#888;font-weight:600;margin-bottom:16px}
.results-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin-bottom:20px}
.result-cat{border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.1)}
.result-cat-header{padding:8px 12px;display:flex;align-items:center;gap:6px}
.result-cat-emoji{font-size:20px}.result-cat-name{font-family:'Fredoka One',cursive;font-size:14px;color:#fff}
.result-words{background:#fff;padding:8px 10px;display:flex;flex-direction:column;gap:4px}
.result-word{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid #F0EEF8;font-size:12px}.result-word:last-child{border-bottom:none}
.result-word .rw-en{font-family:'Fredoka One',cursive;font-weight:700;color:#333}.result-word .rw-zh{color:#aaa;font-size:11px}.result-word .rw-img{font-size:18px}
.cp-piece{position:fixed;pointer-events:none;z-index:9999;border-radius:2px;animation:cf linear forwards}
@keyframes cf{from{transform:translateY(-10px) rotate(0deg);opacity:1}to{transform:translateY(105vh) rotate(720deg);opacity:0}}
@keyframes rp{0%,100%{background:#FFF0F0}50%{background:#FFD5D5}}.pill.red.pulse{animation:rp .4s 3}
/* col-hint removed */
</style>
</head>
<body>
<header>
  <div class="logo">Word Sort<em>!</em></div>
  <div class="hstats">
    <div class="pill red" id="pill-steps">👟 <span id="val-steps">90</span> 步</div>
    <div class="pill">⭐ <span id="val-score">0</span></div>
    <button class="btn-ghost" onclick="showTutorial()">？ 玩法</button>
    <button class="btn" onclick="newGame()">🔄 新游戏</button>
  </div>
</header>
<div class="game">
  <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <div class="f-row" id="f-row"></div>
    <div style="flex:1;min-width:60px"></div>
    <div class="prog-wrap" style="width:200px;flex-shrink:0">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
  </div>
  <div class="mid">
    <div class="draw-area">
      <div class="draw-lbl">📦 摸牌堆</div>
      <div class="draw-row">
        <div class="stock" id="stock" onclick="clickStock()">
          <span class="stock-n" id="stock-n">0</span>
          <span class="stock-icon">🃏</span>
        </div>
        <div class="waste" id="waste"><span class="waste-hint">翻牌<br>到这里</span></div>
      </div>
    </div>
    <div class="tableau" id="tableau"></div>
  </div>
</div>

<div class="overlay" id="tut-overlay">
  <div class="modal tut-modal">
    <div class="m-emoji">🃏</div>
    <div class="m-title">怎么玩？</div>
    <div class="tut-steps">
      <div class="tut-step"><div class="tut-dot">1</div><div class="tut-text">点左边牌堆<b>逐张翻牌</b>。翻到<b style="color:#B8860B">★金边标题卡</b>→选中→点上方空格解锁类别</div></div>
      <div class="tut-step"><div class="tut-dot">2</div><div class="tut-text">解锁后，选中同类单词卡→点类别格归入。若一列<b>所有明牌同类</b>，点最底部那张→再点类别格，<b>整列自动归入</b></div></div>
      <div class="tut-step"><div class="tut-dot">3</div><div class="tut-text">一类<b>收集完毕</b>→格子移走腾出空位，可收集新类别！共 6 个类别，4 个槽位轮换</div></div>
      <div class="tut-step"><div class="tut-dot" style="background:#1DD1A1">4</div><div class="tut-text">全部归完后结算，每类展开<b>英文+中文</b>对照，方便记忆</div></div>
      <div class="tut-step"><div class="tut-dot" style="background:#A29BFE">?</div><div class="tut-text"><b style="color:#A29BFE">紫边</b>=歧义词；<b>🐾动物类</b>显示表情图片！</div></div>
    </div>
    <div class="tut-tags" id="tut-tags"></div>
    <button class="btn" style="font-size:15px;padding:10px 32px" onclick="closeTutAndStart()">开始游戏！</button>
  </div>
</div>
<div class="overlay" id="end-overlay"><div class="modal results-modal" id="end-modal"></div></div>
<div id="toast"></div>
<script>
const ALL_CATS={
  animal:{label:'Animals',emoji:'🐾',color:'#FF6B6B',imgCat:true},
  food:  {label:'Food',   emoji:'🍎',color:'#FF9F43',imgCat:false},
  sport: {label:'Sports', emoji:'⚽',color:'#48DBFB',dark:true,imgCat:false},
  nature:{label:'Nature', emoji:'🌿',color:'#1DD1A1',imgCat:false},
  body:  {label:'Body',   emoji:'👀',color:'#A29BFE',imgCat:false},
  color: {label:'Colors', emoji:'🎨',color:'#FD79A8',imgCat:false},
};
const ALL_WORDS=[
  {word:'Dog',    zh:'狗',   cat:'animal',emoji:'🐶'},
  {word:'Cat',    zh:'猫',   cat:'animal',emoji:'🐱'},
  {word:'Bird',   zh:'鸟',   cat:'animal',emoji:'🐦'},
  {word:'Fish',   zh:'鱼',   cat:'animal',emoji:'🐟',ambig:['animal','food']},
  {word:'Rabbit', zh:'兔子', cat:'animal',emoji:'🐰'},
  {word:'Tiger',  zh:'老虎', cat:'animal',emoji:'🐯'},
  {word:'Apple',  zh:'苹果', cat:'food'},
  {word:'Bread',  zh:'面包', cat:'food'},
  {word:'Cake',   zh:'蛋糕', cat:'food'},
  {word:'Rice',   zh:'米饭', cat:'food'},
  {word:'Egg',    zh:'鸡蛋', cat:'food',ambig:['food','animal']},
  {word:'Pizza',  zh:'披萨', cat:'food'},
  {word:'Soccer', zh:'足球', cat:'sport'},
  {word:'Tennis', zh:'网球', cat:'sport'},
  {word:'Swimming',zh:'游泳',cat:'sport'},
  {word:'Running',zh:'跑步', cat:'sport'},
  {word:'Cycling',zh:'骑车', cat:'sport'},
  {word:'Basketball',zh:'篮球',cat:'sport'},
  {word:'Tree',   zh:'大树', cat:'nature'},
  {word:'Flower', zh:'花',   cat:'nature'},
  {word:'River',  zh:'河流', cat:'nature'},
  {word:'Mountain',zh:'山',  cat:'nature'},
  {word:'Cloud',  zh:'云',   cat:'nature'},
  {word:'Sun',    zh:'太阳', cat:'nature'},
  {word:'Eye',    zh:'眼睛', cat:'body'},
  {word:'Ear',    zh:'耳朵', cat:'body'},
  {word:'Nose',   zh:'鼻子', cat:'body'},
  {word:'Hand',   zh:'手',   cat:'body'},
  {word:'Foot',   zh:'脚',   cat:'body'},
  {word:'Red',    zh:'红色', cat:'color'},
  {word:'Blue',   zh:'蓝色', cat:'color'},
  {word:'Green',  zh:'绿色', cat:'color'},
  {word:'Yellow', zh:'黄色', cat:'color'},
  {word:'Purple', zh:'紫色', cat:'color'},
];
const TITLE_CARDS=Object.entries(ALL_CATS).map(([cat,info])=>({word:info.label.toUpperCase(),cat,isTitle:true,id:'t_'+cat}));

let G={};
let firstGame=true;


function newGame(){
  const gameCats=Object.keys(ALL_CATS);
  const titlePool=TITLE_CARDS.filter(t=>gameCats.includes(t.cat)).map(c=>({...c,faceUp:false,id:'t_'+c.cat+Math.random()}));
  const wordPool=ALL_WORDS.filter(w=>gameCats.includes(w.cat)).map((w,i)=>({...w,faceUp:false,id:'w'+i+Math.random()}));
  const all=[...titlePool,...wordPool];shuffle(all);
  const countPerCat={};wordPool.forEach(w=>{countPerCat[w.cat]=(countPerCat[w.cat]||0)+1;});
  const cols=[];let idx=0;
  for(let i=0;i<6;i++){const col=[];for(let j=0;j<=i;j++){if(idx>=all.length)break;const card=all[idx++];card.faceUp=(j===i);col.push(card);}cols.push(col);}
  const stock=all.slice(idx).map(c=>{c.faceUp=false;return c});
  G={steps:90,score:0,gameCats,countPerCat,cols,stock,waste:[],
    slots:[{cat:null,cards:[],done:false},{cat:null,cards:[],done:false},{cat:null,cards:[],done:false},{cat:null,cards:[],done:false}],
    completedCats:[],selected:null,totalWords:wordPool.length,finished:false};
  document.getElementById('end-overlay').classList.remove('show');
  render();
}

function showTutorial(){
  const tags=document.getElementById('tut-tags');tags.innerHTML='';
  Object.values(ALL_CATS).forEach(c=>{const t=document.createElement('span');t.className='tut-tag';t.style.background=c.color;if(c.dark)t.style.color='#333';t.textContent=c.emoji+' '+c.label;tags.appendChild(t);});
  document.getElementById('tut-overlay').classList.add('show');
}
function closeTutAndStart(){document.getElementById('tut-overlay').classList.remove('show');if(firstGame){firstGame=false;newGame();}}

function render(){renderHeader();renderFoundation();renderStockWaste();renderTableau();renderProgress();}

function renderHeader(){
  document.getElementById('val-steps').textContent=G.steps;
  document.getElementById('val-score').textContent=G.score;
}

function renderFoundation(){
  const row=document.getElementById('f-row');row.innerHTML='';
  G.slots.forEach((slot,si)=>{
    const el=document.createElement('div');
    el.className='f-slot'+(slot.cat?' live':'')+(slot.done?' done':'');
    if(G.selected&&!slot.done){
      const sc=G.selected.card;const{isBottomFaceUp,faceUpCards,colSameCat}=G.selected;
      if(sc.isTitle&&!slot.cat)el.classList.add('drop-hl');
      // single card match
      if(!sc.isTitle&&slot.cat&&!slot.done&&cardMatchesCat(sc,slot.cat))el.classList.add('drop-hl');
      // whole-column dump match
      if(!sc.isTitle&&slot.cat&&!slot.done&&isBottomFaceUp&&colSameCat&&cardMatchesCat({cat:colSameCat},slot.cat))el.classList.add('drop-hl');
    }
    if(!slot.cat){
      el.innerHTML='<div class="f-slot-empty-hint">★<br>放标题卡</div>';
    } else {
      const ci=ALL_CATS[slot.cat];const total=G.countPerCat[slot.cat]||1;const have=slot.cards.length;
      const banner=document.createElement('div');banner.className='f-banner';banner.style.background=ci.color;
      if(ci.dark)banner.style.color='#333';
      banner.innerHTML='<span class="f-banner-emoji">'+ci.emoji+'</span><span class="f-progress">'+have+'/'+total+'</span>';
      el.appendChild(banner);
      if(slot.cards.length>0){
        const chips=document.createElement('div');chips.className='f-chips';
        slot.cards.forEach(card=>{const chip=document.createElement('div');chip.className='f-chip'+(ci.imgCat?' img-chip':'');chip.style.background=ci.color+(slot.done?'99':'');chip.textContent=ci.imgCat?(card.emoji||card.word):card.word;chips.appendChild(chip);});
        el.appendChild(chips);
      }
    }
    el.addEventListener('click',e=>{e.stopPropagation();onClickSlot(si);});
    row.appendChild(el);
  });
}

function renderStockWaste(){
  const sEl=document.getElementById('stock');document.getElementById('stock-n').textContent=G.stock.length;sEl.classList.toggle('empty',G.stock.length===0);
  const wEl=document.getElementById('waste');wEl.innerHTML='';
  if(!G.waste.length){wEl.innerHTML='<span class="waste-hint">翻牌<br>到这里</span>';return;}
  const top=G.waste[G.waste.length-1];const ce=makeCard(top);
  if(G.selected&&G.selected.src==='waste')ce.classList.add('sel');
  ce.addEventListener('click',e=>{e.stopPropagation();onClickWasteTop();});
  wEl.appendChild(ce);
}

function renderTableau(){
  const tab=document.getElementById('tableau');tab.innerHTML='';
  G.cols.forEach((col,ci)=>{
    const colEl=document.createElement('div');colEl.className='col';
    if(!col.length){
      const empty=document.createElement('div');empty.className='col-empty';
      if(G.selected)empty.classList.add('drop-hl');
      empty.addEventListener('click',e=>{e.stopPropagation();onClickCol(ci);});colEl.appendChild(empty);
    } else {
      col.forEach((card,ki)=>{
        const isTop=ki===col.length-1;
        const firstFaceUpIdx=col.findIndex(c=>c.faceUp);
        const isBottomFaceUp=card.faceUp&&(ki===firstFaceUpIdx)&&(col.filter(c=>c.faceUp).length>1);
        const ce=makeCard(card);ce.style.zIndex=ki+1;
        if(!card.faceUp){
          ce.style.pointerEvents='none'; // face-down cards never clickable
        } else if(isTop){
          if(G.selected&&G.selected.src==='col'&&G.selected.colIdx===ci)ce.classList.add('sel');
          ce.addEventListener('click',e=>{e.stopPropagation();onClickTopCard(ci,card,ki);});
        } else if(isBottomFaceUp){
          // bottom face-up card: clickable for col-dump selection
          // show selected style if it's the current selection
          if(G.selected&&G.selected.src==='col'&&G.selected.colIdx===ci&&G.selected.isBottomFaceUp)ce.classList.add('sel');
          ce.style.pointerEvents='auto';
          ce.addEventListener('click',e=>{e.stopPropagation();onClickTopCard(ci,card,ki);});
        } else {
          ce.style.pointerEvents='none';
          if(card.faceUp)ce.classList.add('col-sel-dim');
        }
        colEl.appendChild(ce);
      });
    }
    colEl.addEventListener('click',e=>{e.stopPropagation();onClickCol(ci);});tab.appendChild(colEl);
  });
}

function makeCard(card){
  const el=document.createElement('div');
  if(!card.faceUp){el.className='card face-down';return el;}
  const ci=card.cat?ALL_CATS[card.cat]:null;el.className='card';
  if(card.isTitle)el.classList.add('title-card');else if(card.ambig)el.classList.add('ambig');
  if(ci&&ci.imgCat&&!card.isTitle)el.classList.add('img-card');
  if(card.cat&&!card.isTitle)el.style.borderColor=ci?ci.color:'';
  if(card.ambig)el.style.borderColor='#A29BFE';
  const content=ci&&ci.imgCat&&!card.isTitle?(card.emoji||card.word):card.word;
  el.innerHTML='<span class="cw">'+content+'</span>';return el;
}

function renderProgress(){
  const done=G.slots.reduce((s,sl)=>s+sl.cards.length,0)+G.completedCats.reduce((s,cc)=>s+cc.cards.length,0);
  const pct=G.totalWords>0?Math.round(done/G.totalWords*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('prog-pct').textContent=pct+'%';
}

function clickStock(){
  if(G.finished)return;
  if(!G.stock.length){if(!G.waste.length){toast('没有牌了！','warn');return;}const recycled=[...G.waste].reverse().map(c=>{c.faceUp=false;return c});G.stock=recycled;G.waste=[];spendStep();toast('🔁 牌堆重置','info');render();return;}
  spendStep();const card=G.stock.pop();card.faceUp=true;G.waste.push(card);
  if(card.isTitle)toast('★ 翻到标题卡！选中它 → 点上方空格解锁类别','info',3000);render();
}

function onClickWasteTop(){
  if(G.finished)return;if(!G.waste.length)return;
  const top=G.waste[G.waste.length-1];
  if(G.selected&&G.selected.src==='waste'){G.selected=null;render();return;}
  G.selected={src:'waste',card:top};render();
  toast('选中 '+top.word+' — '+(top.isTitle?'点上方空格放置解锁':'点类别格归入，或点列顶叠放'),'info',2200);
}

function onClickTopCard(ci,card,ki){
  if(G.finished)return;if(!card.faceUp)return;
  // If something already selected, treat as move-to-col (onClickCol handles same-col deselect)
  if(G.selected){onClickCol(ci);return;}
  const col=G.cols[ci];
  const faceUpCards=col.filter(c=>c.faceUp);
  const firstFaceUpIdx=col.findIndex(c=>c.faceUp);
  // isBottomFaceUp: clicked the lowest face-up card AND there are multiple face-up cards
  const isBottomFaceUp=(ki===firstFaceUpIdx)&&(faceUpCards.length>1);
  const colSameCat=isBottomFaceUp?checkAllSameCat(faceUpCards):null;
  G.selected={src:'col',colIdx:ci,card,isBottomFaceUp,faceUpCards,colSameCat};
  render();
  if(isBottomFaceUp&&colSameCat){
    toast('选中 '+card.word+'（整列同类）— 点类别格一次归入整列！','info',2500);
  } else {
    toast('选中 '+card.word+' — 点类别格归入，或点另一列叠放','info',2000);
  }
}



function checkAllSameCat(cards){let common=getCats(cards[0]);for(let i=1;i<cards.length;i++){const c=getCats(cards[i]);common=common.filter(x=>c.includes(x));if(!common.length)return null;}return common[0];}
function getCats(card){return card.ambig?card.ambig:[card.cat]}

function onClickCol(ci){
  if(G.finished)return;if(!G.selected)return;
  const{src,card,colIdx}=G.selected;if(src==='col'&&colIdx===ci){G.selected=null;render();return;}
  const targetCol=G.cols[ci];let canPlace=false;
  if(!targetCol.length){canPlace=true;}
  else{const top=targetCol[targetCol.length-1];if(!top.faceUp){toast('不能放到暗牌上！','err');return;}if(top.isTitle||card.isTitle){toast('标题卡要放到上方格子！','err');return;}canPlace=sameCategory(card,top);}
  if(!canPlace){const top=targetCol.length>0?targetCol[targetCol.length-1]:null;toast('❌ 类别不符 — '+card.word+' 与 '+(top?top.word:'目标')+' 不同类','err');return;}
  removeFromSource(src,colIdx);targetCol.push(card);G.selected=null;spendStep();G.score+=2;render();
}

function onClickSlot(si){
  if(G.finished)return;if(!G.selected)return;
  const sel=G.selected; // capture before anything clears it
  const{src,card,colIdx,isBottomFaceUp,faceUpCards,colSameCat}=sel;
  const slot=G.slots[si];

  // ── Title card: unlock slot ──
  if(card.isTitle){
    if(slot.cat){toast('这个格子已解锁！','warn');return;}
    if(G.slots.some(s=>s.cat===card.cat)||G.completedCats.some(c=>c.cat===card.cat)){toast(ALL_CATS[card.cat].label+' 已经解锁了！','warn');return;}
    slot.cat=card.cat;removeFromSource(src,colIdx);G.selected=null;spendStep();G.score+=10;
    toast('🔓 '+ALL_CATS[card.cat].emoji+' '+ALL_CATS[card.cat].label+' 解锁！','ok',2000);render();return;
  }

  if(!slot.cat){toast('先放★标题卡解锁这个格子！','err');return;}

  // ── Whole-column dump ──
  // Triggered when: selected from col, it's the bottom face-up card, all face-up cards share a cat, and that cat matches this slot
  if(src==='col' && isBottomFaceUp && colSameCat && slot.cat && (colSameCat===slot.cat || (faceUpCards[0].ambig && faceUpCards[0].ambig.includes(slot.cat)))){
    const toCollect=[...faceUpCards];
    G.cols[colIdx]=G.cols[colIdx].filter(c=>!c.faceUp);
    const newCol=G.cols[colIdx];
    if(newCol.length>0&&!newCol[newCol.length-1].faceUp)newCol[newCol.length-1].faceUp=true;
    slot.cards.push(...toCollect);
    G.selected=null;spendStep();G.score+=toCollect.length*10+5;
    toast('🎉 整列 '+toCollect.length+' 张一次归入！','ok',2200);
    render();checkCatComplete(si);checkWin();
    if(newCol.length>0) setTimeout(()=>toast('🃏 翻开新牌！','info',900),180);
    return;
  }

  // ── Single card: must match slot ──
  if(!cardMatchesCat(card,slot.cat)){toast('❌ '+card.word+' 不是 '+ALL_CATS[slot.cat].label,'err');return;}

  // Sweep matching waste cards when source is waste
  const collected=[card];
  if(src==='waste'){
    const remainWaste=[];
    for(let i=0;i<G.waste.length-1;i++){const wc=G.waste[i];if(cardMatchesCat(wc,slot.cat))collected.push(wc);else remainWaste.push(wc);}
    G.waste=remainWaste;if(collected.length>1)toast('✨ 一次归入 '+collected.length+' 张！','ok',1400);
  } else {removeFromSource(src,colIdx);}

  slot.cards.push(...collected);G.selected=null;spendStep();G.score+=collected.length*10;
  if(collected.length===1){const ok=['👏 正确！','✨ 厉害！','🌟 太棒了！','🎉 答对啦！','🔥 继续！'];toast(ok[~~(Math.random()*ok.length)],'ok',1000);}
  render();checkCatComplete(si);checkWin();
}

function checkCatComplete(si){
  const slot=G.slots[si];const total=G.countPerCat[slot.cat]||999;
  if(slot.cards.length>=total){
    slot.done=true;G.completedCats.push({cat:slot.cat,cards:[...slot.cards]});G.score+=20;
    toast('🏅 '+ALL_CATS[slot.cat].emoji+' '+ALL_CATS[slot.cat].label+' 全部收集！+20分','ok',2500);
    setTimeout(()=>{slot.cat=null;slot.cards=[];slot.done=false;render();},1200);
  }
}

function removeFromSource(src,colIdx){
  if(src==='waste'){G.waste.pop();}
  else{G.cols[colIdx].pop();const col=G.cols[colIdx];if(col.length>0&&!col[col.length-1].faceUp){col[col.length-1].faceUp=true;setTimeout(()=>toast('🃏 翻开新牌！','info',900),120);}}
}

function sameCategory(a,b){const ca=getCats(a),cb=getCats(b);return ca.some(c=>cb.includes(c));}
function cardMatchesCat(card,cat){return card.cat===cat||(card.ambig&&card.ambig.includes(cat));}

function spendStep(){
  G.steps--;
  if(G.steps<=0){G.steps=0;renderHeader();if(!G.finished)setTimeout(gameOver,300);return;}
  if(G.steps<=15){const p=document.getElementById('pill-steps');p.classList.remove('pulse');void p.offsetWidth;p.classList.add('pulse');}
  renderHeader();
}

function checkWin(){
  const done=G.slots.reduce((s,sl)=>s+sl.cards.length,0)+G.completedCats.reduce((s,cc)=>s+cc.cards.length,0);
  if(done>=G.totalWords){G.finished=true;spawnConfetti();setTimeout(()=>showResults(true),700);}
}
function gameOver(){G.finished=true;showResults(false);}

function showResults(win){
  const allCollected={};
  G.completedCats.forEach(cc=>{allCollected[cc.cat]=cc.cards;});
  G.slots.forEach(sl=>{if(sl.cat&&sl.cards.length>0)allCollected[sl.cat]=sl.cards;});
  const done=Object.values(allCollected).reduce((s,c)=>s+c.length,0);
  const modal=document.getElementById('end-modal');
  let html='<div class="m-emoji">'+(win?'🏆':'😅')+'</div>';
  html+='<div class="results-title">'+(win?'全部归完啦！':'步数用完了…')+'</div>';
  html+='<div class="results-sub">'+(win?'成功归类全部 '+G.totalWords+' 个单词！得分 '+G.score:'完成了 '+done+'/'+G.totalWords+' 个，下次加油！')+'</div>';
  html+='<div class="m-stats"><div class="m-stat"><small>⭐ 得分</small>'+G.score+'</div><div class="m-stat"><small>🗂️ 归类</small>'+done+'/'+G.totalWords+'</div><div class="m-stat"><small>👟 剩余</small>'+G.steps+'步</div></div>';
  if(Object.keys(allCollected).length>0){
    html+='<div style="font-family:\'Fredoka One\',cursive;font-size:15px;color:#333;margin-bottom:10px;text-align:left">📚 你学到的单词</div>';
    html+='<div class="results-grid">';
    Object.entries(allCollected).forEach(([cat,cards])=>{
      const ci=ALL_CATS[cat];
      html+='<div class="result-cat" style="border:2px solid '+ci.color+'"><div class="result-cat-header" style="background:'+ci.color+'"><span class="result-cat-emoji">'+ci.emoji+'</span><span class="result-cat-name">'+ci.label+'</span></div><div class="result-words">';
      cards.forEach(card=>{
        if(ci.imgCat){html+='<div class="result-word"><span class="rw-img">'+(card.emoji||'🐾')+'</span><span class="rw-en">'+card.word+'</span><span class="rw-zh">'+(card.zh||'')+'</span></div>';}
        else{html+='<div class="result-word"><span class="rw-en">'+card.word+'</span><span class="rw-zh">'+(card.zh||'')+'</span></div>';}
      });
      html+='</div></div>';
    });
    html+='</div>';
  }
  html+='<button class="btn" style="font-size:15px;padding:10px 32px" onclick="newGame();document.getElementById(\'end-overlay\').classList.remove(\'show\')">再玩一局！</button>';
  modal.innerHTML=html;document.getElementById('end-overlay').classList.add('show');
}

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=~~(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let _tt;
function toast(msg,type,ms){type=type||'info';ms=ms||2000;const el=document.getElementById('toast');el.className='show '+type;el.textContent=msg;clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),ms);}

function spawnConfetti(){
  const colors=['#6C63FF','#FF6B6B','#FF9F43','#48DBFB','#1DD1A1','#F7C948'];
  for(let i=0;i<70;i++)setTimeout(()=>{const el=document.createElement('div');el.className='cp-piece';el.style.cssText='left:'+Math.random()*100+'vw;background:'+colors[~~(Math.random()*colors.length)]+';animation-duration:'+(1.4+Math.random()*1.5)+'s;animation-delay:'+Math.random()*.5+'s;width:'+(6+Math.random()*10)+'px;height:'+(6+Math.random()*10)+'px;border-radius:'+(Math.random()>.5?'50%':'2px')+';top:0';document.body.appendChild(el);setTimeout(()=>el.remove(),3500);},i*18);
}

document.addEventListener('click',e=>{
  if(!G.selected)return;
  if(!e.target.closest('.card,.waste,.f-slot,.col,.col-empty,.stock')){G.selected=null;render();}
});

showTutorial();
newGame();
</script>
</body>
